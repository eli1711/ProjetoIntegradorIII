<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de Alunos</title>
    <link rel="stylesheet" href="css/consultaAluno.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="js/navbar-protection.js"></script>
  </head>
  <body>
    <header>
      <div class="header-content">
        <div class="logo-container">
          <img src="img/senai-logo.png" class="logo" alt="Logo SENAI" />
          <h1>Sistema de Gestão de Alunos</h1>
        </div>

        <nav>
          <button class="nav-toggle" id="navToggle">
            <i class="fas fa-bars"></i>
          </button>

          <ul id="navMenu">
            <li>
              <a href="./principal.html" class="active"
                ><i class="fas fa-home"></i> Home</a
              >
            </li>

            <li class="dropdown">
              <a href="#"
                ><i class="fas fa-user-graduate"></i> Alunos
                <i class="fas fa-chevron-down"></i
              ></a>
              <div class="dropdown-content">
                <a href="./cadastroAluno.html"
                  ><i class="fas fa-user-plus"></i> Cadastrar Aluno</a
                >
                <a href="./consultaAluno.html"
                  ><i class="fas fa-search"></i> Consultar Alunos</a
                >
                <a href="./importar_alunos.html"
                  ><i class="fas fa-file-csv"></i> Importar CSV</a
                >
              </div>
            </li>

            <li>
              <a href="./turmas.html"
                ><i class="fas fa-chalkboard"></i> Turmas</a
              >
            </li>

            <li>
              <a href="./ocorrencias.html"
                ><i class="fas fa-exclamation-triangle"></i> Ocorrências</a
              >
            </li>

            <li class="dropdown">
              <a href="#"
                ><i class="fas fa-chart-bar"></i> Relatórios
                <i class="fas fa-chevron-down"></i
              ></a>
              <div class="dropdown-content">
                <a href="./relatorios.html"
                  ><i class="fas fa-chart-pie"></i> Dashboard</a
                >
                <a href="./historico.html"
                  ><i class="fas fa-history"></i> Histórico</a
                >
              </div>
            </li>

            <li>
              <a href="./criar_usuario.html"
                ><i class="fas fa-user-cog"></i> Usuários</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="container">
      <div class="form-container">
        <div class="form-header">
          <h2><i class="fas fa-search"></i> Consulta de Alunos</h2>
        </div>

        <div class="form-content">
          <div class="form-section">
            <h3 class="section-title">
              <i class="fas fa-filter"></i> Filtros de Busca
            </h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="alunoNome">Nome do Aluno:</label>
                <input
                  type="text"
                  id="alunoNome"
                  placeholder="Digite o nome do aluno"
                />
              </div>
              <div class="form-group">
                <label for="alunoMatricula">Matrícula:</label>
                <input
                  type="text"
                  id="alunoMatricula"
                  placeholder="Digite a matrícula"
                />
              </div>
              <div class="form-group">
                <label for="alunoCurso">Curso:</label>
                <select id="alunoCurso">
                  <option value="">Todos os cursos</option>
                </select>
              </div>
            </div>
            <div class="submit-container">
              <button id="consultarButton" class="consultar-button">
                <i class="fas fa-search"></i> Consultar
              </button>
            </div>
          </div>

          <div id="resultadoConsulta"></div>
        </div>
      </div>
    </div>

    <footer>
      <p>
        &copy; 2024 Departamento de Qualidade de Vida - Todos os direitos
        reservados.
      </p>
    </footer>

    <script src="js/consultarAluno.js"></script>
    <script src="js/consulta.js"></script>
  </body>
</html>
